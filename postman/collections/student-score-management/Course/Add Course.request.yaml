$kind: http-request
name: Add Course
method: POST
url: '{{baseUrl}}/course/add'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "course_name": "Advanced Mathematics",
      "course_code": "MATH101",
      "credit": 4,
      "hours": 64,
      "description": "Calculus and linear algebra"
    }
